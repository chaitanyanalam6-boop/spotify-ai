<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify AI Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #222230;
    --green: #1DB954;
    --purple: #9b5de5;
    --text: #f0f0f5;
    --muted: #7070a0;
    --card: #16161f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 28px 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    background: linear-gradient(90deg, var(--green), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* SETUP SCREEN */
  #setup {
    text-align: center;
  }

  #setup h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  #setup p {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 40px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    text-align: left;
    max-width: 520px;
    margin: 0 auto;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--green);
  }

  .btn-primary {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.02em;
    transition: opacity 0.2s;
    margin-top: 4px;
  }

  .btn-primary:hover { opacity: 0.85; }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 16px;
    text-align: center;
    line-height: 1.5;
  }

  .hint a { color: var(--green); text-decoration: none; }

  /* APP SCREEN */
  #app { display: none; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .top-bar h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
  }

  .user-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 8px 16px;
    font-size: 0.85rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .user-pill span { color: var(--text); font-weight: 500; }

  /* Playlists */
  .section-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
    font-weight: 500;
  }

  .playlist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
  }

  .playlist-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }

  .playlist-card:hover {
    border-color: var(--green);
    transform: translateY(-2px);
  }

  .playlist-card.selected {
    border-color: var(--green);
    background: #0d1f14;
  }

  .playlist-img {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 8px;
    object-fit: cover;
    background: var(--border);
    margin-bottom: 10px;
  }

  .playlist-name {
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .playlist-count {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 3px;
  }

  .btn-analyze {
    background: linear-gradient(90deg, var(--green), var(--purple));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 28px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: opacity 0.2s;
    display: block;
    margin-bottom: 36px;
  }

  .btn-analyze:hover { opacity: 0.85; }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Results */
  #results { display: none; }

  .genre-group {
    margin-bottom: 32px;
  }

  .genre-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .genre-badge {
    background: var(--purple);
    color: #fff;
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 0.78rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .genre-count {
    font-size: 0.8rem;
    color: var(--muted);
  }

  .song-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .song-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 12px;
    align-items: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .song-row:hover { border-color: var(--purple); }

  .song-art {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--border);
  }

  .song-info .title {
    font-size: 0.9rem;
    font-weight: 500;
  }

  .song-info .artist {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .mood-tag {
    font-size: 0.72rem;
    color: var(--green);
    background: #0d1f14;
    border: 1px solid #1a3d25;
    border-radius: 99px;
    padding: 3px 10px;
    white-space: nowrap;
  }

  /* Song detail panel */
  .song-detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-top: 8px;
    display: none;
  }

  .song-detail.open { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }

  .detail-stat {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .detail-stat .val {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .detail-stat .key {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .detail-insight {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Loading */
  .loading-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .loading-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--purple));
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 99px;
  }

  .loading-text {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 20px;
  }

  .error-msg {
    background: #1f0d0d;
    border: 1px solid #3d1a1a;
    color: #ff6b6b;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 0.88rem;
    margin-bottom: 20px;
    display: none;
  }

  @media (max-width: 600px) {
    header { padding: 20px; }
    main { padding: 28px 16px; }
    #setup h1 { font-size: 1.8rem; }
    .detail-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎵 SoundSort AI</div>
</header>

<main>

  <!-- SETUP -->
  <div id="setup">
    <h1>Your playlist,<br>intelligently sorted.</h1>
    <p>Connect Spotify → pick a playlist → AI separates folk, pop, melody & more.</p>

    <div class="setup-card">
      <div class="field">
        <label>Spotify Client ID</label>
        <input type="text" id="clientId" placeholder="e.g. e2fbb1b932ce4b83..." />
      </div>
      <div class="field">
        <label>Claude API Key</label>
        <input type="password" id="claudeKey" placeholder="sk-ant-..." />
      </div>
      <div class="error-msg" id="setupError"></div>
      <button class="btn-primary" onclick="startAuth()">Connect to Spotify →</button>
      <p class="hint">
        Get your Spotify key at <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com/dashboard</a><br>
        Get your Claude key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
      </p>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="top-bar">
      <h2>Pick a Playlist</h2>
      <div class="user-pill">Logged in as <span id="userName">...</span></div>
    </div>

    <div class="error-msg" id="appError"></div>
    <div class="section-label">Your Playlists</div>
    <div class="playlist-grid" id="playlistGrid"></div>

    <button class="btn-analyze" id="analyzeBtn" onclick="analyzeSongs()" disabled>
      ✨ Analyze Selected Playlist
    </button>

    <div id="loadingArea" style="display:none">
      <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
      <div class="loading-text" id="loadingText">Getting songs...</div>
    </div>

    <div id="results"></div>
  </div>

</main>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let accessToken = null;
let selectedPlaylist = null;
let claudeApiKey = null;

// ── PKCE helpers ──────────────────────────────────────────────────────────────
function generateCodeVerifier() {
  const arr = new Uint8Array(56);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function startAuth() {
  const clientId = document.getElementById('clientId').value.trim();
  claudeApiKey = document.getElementById('claudeKey').value.trim();
  const errEl = document.getElementById('setupError');

  if (!clientId || !claudeApiKey) {
    errEl.textContent = 'Please enter both keys before connecting.';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';

  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  const redirectUri = window.location.origin + window.location.pathname;

  localStorage.setItem('pkce_verifier', verifier);
  localStorage.setItem('spotify_client_id', clientId);
  localStorage.setItem('claude_key', claudeApiKey);

  const params = new URLSearchParams({
    client_id: clientId,
    response_type: 'code',
    redirect_uri: redirectUri,
    code_challenge_method: 'S256',
    code_challenge: challenge,
    scope: 'playlist-read-private user-read-private user-read-email'
  });

  window.location = 'https://accounts.spotify.com/authorize?' + params;
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return false;

  const verifier = localStorage.getItem('pkce_verifier');
  const clientId = localStorage.getItem('spotify_client_id');
  claudeApiKey = localStorage.getItem('claude_key');
  const redirectUri = window.location.origin + window.location.pathname;

  // Clean URL
  window.history.replaceState({}, '', window.location.pathname);

  const resp = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code,
      redirect_uri: redirectUri,
      client_id: clientId,
      code_verifier: verifier
    })
  });

  const data = await resp.json();
  if (!data.access_token) {
    showAppError('Spotify login failed. Please refresh and try again.');
    return false;
  }

  accessToken = data.access_token;
  return true;
}

// ── Spotify API ───────────────────────────────────────────────────────────────
async function spotifyGet(url) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
  if (!r.ok) { const body = await r.json().catch(() => ({})); throw new Error('Spotify ' + r.status + ': ' + (body?.error?.message || 'check app settings')); }
  return r.json();
}

async function loadApp() {
  const ok = await handleCallback();
  if (!ok) return;

  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  try {
    const me = await spotifyGet('https://api.spotify.com/v1/me');
    document.getElementById('userName').textContent = me.display_name || me.email || me.id || '?';
    const debugEl = document.getElementById('appError');
    debugEl.textContent = 'DEBUG — logged in as: ' + (me.email || me.id) + ' | product: ' + me.product;
    debugEl.style.display = 'block';
    debugEl.style.background = '#0d1f14';
    debugEl.style.color = '#1DB954';
    debugEl.style.borderColor = '#1a3d25';

    const pl = await spotifyGet('https://api.spotify.com/v1/me/playlists?limit=20');
    debugEl.style.display = 'none';
    renderPlaylists(pl.items);
  } catch (e) {
    showAppError('Error: ' + e.message);
  }
}

function renderPlaylists(playlists) {
  const grid = document.getElementById('playlistGrid');
  grid.innerHTML = '';
  playlists.forEach(pl => {
    if (!pl) return;
    const img = pl.images?.[0]?.url || '';
    const card = document.createElement('div');
    card.className = 'playlist-card';
    card.innerHTML = `
      <img class="playlist-img" src="${img}" onerror="this.style.background='#222'">
      <div class="playlist-name">${pl.name}</div>
      <div class="playlist-count">${pl.tracks.total} songs</div>
    `;
    card.onclick = () => {
      document.querySelectorAll('.playlist-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedPlaylist = pl;
      document.getElementById('analyzeBtn').disabled = false;
    };
    grid.appendChild(card);
  });
}

async function getPlaylistTracks(playlistId) {
  let tracks = [];
  let url = `https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=50&fields=next,items(track(name,artists,album(images)))`;
  while (url && tracks.length < 50) {
    const data = await spotifyGet(url);
    data.items.forEach(item => {
      if (item?.track?.name) tracks.push(item.track);
    });
    url = data.next;
  }
  return tracks.slice(0, 50);
}

// ── AI Analysis ───────────────────────────────────────────────────────────────
async function analyzeWithClaude(tracks) {
  const songList = tracks.map((t, i) =>
    `${i + 1}. "${t.name}" by ${t.artists.map(a => a.name).join(', ')}`
  ).join('\n');

  const prompt = `You are a music expert. Analyze these songs and for each one return JSON.

Songs:
${songList}

Return ONLY a valid JSON array, nothing else. Each object must have exactly these fields:
- "index": the song number (1-based)
- "genre": one of: Folk, Pop, Rock, R&B, Hip-Hop, Electronic, Classical, Jazz, Melody, Country, Latin, Reggae, Metal, Indie, Other
- "mood": one short mood word (e.g. Energetic, Melancholic, Chill, Romantic, Upbeat, Dark, Peaceful)
- "bpm": estimated BPM as a number
- "key": musical key (e.g. C Major, A Minor)
- "insight": one sentence about what makes this song special

Return only the JSON array.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': claudeApiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await response.json();
  if (!response.ok) throw new Error(data.error?.message || 'Claude API error');

  const text = data.content[0].text.trim();
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ── Main analyze flow ─────────────────────────────────────────────────────────
async function analyzeSongs() {
  if (!selectedPlaylist) return;

  document.getElementById('results').innerHTML = '';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loadingArea').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = true;
  setProgress(10, 'Loading songs from Spotify...');

  try {
    const tracks = await getPlaylistTracks(selectedPlaylist.id);
    setProgress(35, `Analyzing ${tracks.length} songs with AI...`);

    const analysis = await analyzeWithClaude(tracks);
    setProgress(90, 'Organizing by genre...');

    renderResults(tracks, analysis);
    setProgress(100, 'Done!');

    setTimeout(() => {
      document.getElementById('loadingArea').style.display = 'none';
    }, 600);

  } catch (e) {
    document.getElementById('loadingArea').style.display = 'none';
    showAppError('Analysis failed: ' + e.message);
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function setProgress(pct, text) {
  document.getElementById('loadingFill').style.width = pct + '%';
  document.getElementById('loadingText').textContent = text;
}

function renderResults(tracks, analysis) {
  // Map analysis back to tracks
  const enriched = tracks.map((t, i) => {
    const ai = analysis.find(a => a.index === i + 1) || {};
    return { ...t, ai };
  });

  // Group by genre
  const groups = {};
  enriched.forEach(t => {
    const g = t.ai.genre || 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(t);
  });

  const container = document.getElementById('results');
  container.innerHTML = '<div class="section-label" style="margin-bottom:20px">Sorted by Genre</div>';
  container.style.display = 'block';

  Object.entries(groups).sort((a, b) => b[1].length - a[1].length).forEach(([genre, songs]) => {
    const group = document.createElement('div');
    group.className = 'genre-group';
    group.innerHTML = `
      <div class="genre-header">
        <span class="genre-badge">${genre}</span>
        <span class="genre-count">${songs.length} song${songs.length > 1 ? 's' : ''}</span>
      </div>
      <div class="song-list" id="list-${genre.replace(/\s/g,'-')}"></div>
    `;
    container.appendChild(group);

    const list = group.querySelector('.song-list');
    songs.forEach(song => {
      const img = song.album?.images?.[1]?.url || song.album?.images?.[0]?.url || '';
      const row = document.createElement('div');
      row.className = 'song-row';
      row.innerHTML = `
        <img class="song-art" src="${img}" onerror="this.style.background='#222'">
        <div class="song-info">
          <div class="title">${song.name}</div>
          <div class="artist">${song.artists.map(a => a.name).join(', ')}</div>
        </div>
        <span class="mood-tag">${song.ai.mood || ''}</span>
      `;

      const detail = document.createElement('div');
      detail.className = 'song-detail';
      detail.innerHTML = `
        <div class="detail-grid">
          <div class="detail-stat"><div class="val">${song.ai.bpm || '—'}</div><div class="key">BPM</div></div>
          <div class="detail-stat"><div class="val">${song.ai.key || '—'}</div><div class="key">Key</div></div>
          <div class="detail-stat"><div class="val">${song.ai.mood || '—'}</div><div class="key">Mood</div></div>
        </div>
        <div class="detail-insight">${song.ai.insight || ''}</div>
      `;

      row.onclick = () => {
        const isOpen = detail.classList.contains('open');
        document.querySelectorAll('.song-detail').forEach(d => d.classList.remove('open'));
        if (!isOpen) detail.classList.add('open');
      };

      list.appendChild(row);
      list.appendChild(detail);
    });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showAppError(msg) {
  const el = document.getElementById('appError');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Init ──────────────────────────────────────────────────────────────────────
if (window.location.search.includes('code=')) {
  loadApp();
}
</script>
</body>
</html>
